<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Belle iledée d'Anais</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- En-tête -->
    <header>
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Logo Belle iledée d'Anais">
        </a>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="apropos.html">À propos</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <!-- Formulaire de Contact -->
    <div class="contact-container">
        <h2>Contactez-moi</h2>
        <p>Une question, une commande personnalisée ou un coup de cœur ? Laissez-moi un message !</p>
        
        <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
            <div class="form-group">
                <label for="name">Votre Nom</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Votre Adresse E-mail</label>
                <input type="email" id="email" name="_replyto" required>
            </div>

            <div class="form-group">
                <label for="message">Votre Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <div class="form-submit">
                <button type="submit">Envoyer le message</button>
            </div>
        </form>
    </div>

    <!-- Pied de page -->
    <footer>
        <p>&copy; 2026 Belle iledée d'Anais - Tous droits réservés.</p>
    </footer>

    <!-- Script JavaScript pour la transition de page -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add("fade-in");
        });

        const links = document.querySelectorAll("nav a, header a.logo-container");
        links.forEach(link => {
            link.addEventListener("click", function(e) {
                const targetUrl = this.href;
                if (targetUrl.includes("#")) return;

                e.preventDefault();
                document.body.classList.remove("fade-in");

                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 400);
            });
        });
    </script>

</body>
</html>
